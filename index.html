filter:brightness(1.35);transform:translateY(2px)}.padGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}.pad{--mx:30px;--my:24px;--ix:50%;--iy:50%;position:relative;height:132px;border:1px solid #365057;border-radius:8px;background:radial-gradient(circle at var(--ix,50%) var(--iy,50%),rgba(121,217,154,.34),transparent 24%),linear-gradient(135deg,#10191d,#1d2b31);touch-action:none;overflow:hidden}.pad:before,.pad:after{content:"";position:absolute;background:rgba(255,255,255,.35);pointer-events:none}.pad:before{left:var(--ix,50%);top:var(--my);bottom:8px;width:1px}.pad:after{top:var(--iy,50%);left:var(--mx);right:8px;height:1px}.pad b{display:none}.pad .xLab{position:absolute;left:var(--mx);right:8px;top:5px;text-align:center;font-size:11px;font-weight:800;color:#eef7f3;pointer-events:none}.pad .yLab{position:absolute;left:5px;top:var(--my);bottom:8px;writing-mode:vertical-rl;transform:rotate(180deg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#eef7f3;pointer-events:none}.pad span{display:none}.pad .xLab{display:block}.pad .yLab{display:flex}.miniBtns{display:flex;gap:5px;margin-top:6px}.miniBtns button{flex:1}.noteGrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));grid-template-rows:repeat(4,1fr);gap:5px;margin-top:7px}.noteGrid button{aspect-ratio:1.2;min-height:48px;padding:0;border-color:#00d8e6;background:#071114;color:#77f8ff;font-weight:800}.noteGrid button.active{background:#18c7d0;border-color:#8fffff;color:#041012}.noteGrid button.root:after{content:"▲";font-size:11px}.envBox{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:7px}.envBox button{min-height:52px}.spacePanel .cardName{color:#d7efe5}@media(max-width:720px){.loader{grid-template-columns:60px 1fr auto auto}.cards{grid-template-columns:1fr}.card{width:calc(100% - 34px);min-height:398px}.padGrid{grid-template-columns:1fr}.pad{height:118px;--mx:28px;--my:22px}.wave{height:96px}.keyboardHead{grid-template-col <body>
<main>
  <section class="loader">
    <label class="fileBtn">Cargar<input id="file" type="file" accept=".mp3,.m4a,.wav,.aac,.aif,.aiff,audio/mpeg,audio/mp3,audio/mp4,audio/aac,audio/wav,audio/x-wav,audio/aiff"></label>

    <div id="keyControls"></div>

  </section>
</main>
<script>
const APP_VERSION='20260606-27';
if(new URLSearchParams(location.search).get('v')!==APP_VERSION)location.replace(location.pathname+'?v='+APP_VERSION);
let ctx=null, selectedFile=null, selectedDataUrl='', selectedMediaUrl='', nextId=1, focusedGran=null, focusedLoop=null;
let master=null, audioReady=false, unlockEl=null;
const gran=[], loops=[], notes=new Map(), drag={gran:new Map(), loop:new Map()}, timers=new Map(), loopNodes=new Map();
const N=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const IOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
const E={file:gid('file'),fileName:gid('fileName'),makeGran:gid('makeGran'),makeLoop:gid('makeLoop'),makeKeys:gid('makeKeys'),granList:gid('granList'),loopList:gid('loopList'),granCount:gid('granCount'),loopCount:gid('loopCount'),keyName:gid('keyName'),keyCode:gid('keyCode'),keyMode:gid('keyMode'),keyControls:gid('keyControls'),keyboard:gid('keyboard'),keyboardWrap:gid('keyboardWrap')};
const keys={name:'---',dataUrl:'',mediaUrl:'',buffer:null,volume:.8,transpose:0,filter:7000,mode:'fixed'};
function gid(id){return document.getElementById(id)}
function log(t){E.fileName.textContent=t}
function wavUrl(freq=440,dur=.18,vol=.25){const sr=22050,len=Math.floor(sr*dur),buf=new ArrayBuffer(44+len*2),v=new DataView(buf);function st(o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}st(0,'RIFF');v.setUint32(4,36+len*2,true);st(8,'WAVE');st(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);st(36,'data');v.setUint32(40,len*2,true);for(let i=0;i<len;i++){const a=1-i/len,s=Math.sin(2*Math.PI*freq*i/sr)*vol*a;v.setInt16(44+i*2,s*32767,true)}let bin='';new Uint8Array(buf).forEach(b=>bin+=String.fromCharCode(b));return 'data:audio/wav;base64,'+btoa(bin)}
async function unlockMedia(){try{if(!unlockEl){unlockEl=new Audio(wavUrl(20,.03,0));unlockEl.preload='auto';unlockEl.playsInline=true;unlockEl.setAttribute('playsinline','')}unlockEl.currentTime=0;await unlockEl.play();unlockEl.pause();return true}catch(e){return false}}
function ac(){if(!ctx){const AC=window.AudioContext||window.webkitAudioContext;if(!AC){log('Audio no disponible');return null}try{ctx=new AC({latencyHint:'interactive'})}catch(e){ctx=new AC()}master=ctx.createGain();master.gain.value=1;master.connect(ctx.destination)}return ctx}
async function unlockAudio(){await unlockMedia();const c=ac();if(!c)return false;try{if(c.state!=='running')await c.resume()}catch(e){}if(!audioReady&&c.state==='running'){const b=c.createBuffer(1,1,c.sampleRate),s=c.createBufferSource(),g=c.createGain();g.gain.value=0;s.buffer=b;s.connect(g);g.connect(c.destination);s.start(0);audioReady=true;log('Audio listo')}else if(c.state!=='running')log('Toca Play para activar audio');return c.state==='running'}
async function resume(){return unlockAudio()}
['touchstart','pointerdown','mousedown','click'].forEach(ev=>document.addEventListener(ev,()=>{if(!audioReady)unlockAudio().catch(()=>{})},{passive:true}));
E.file.onchange=async()=>{selectedFile=E.file.files[0]||null;selectedDataUrl='';if(selectedMediaUrl)URL.revokeObjectURL(selectedMediaUrl);selectedMediaUrl='';if(!selectedFile)return;selectedMediaUrl=URL.createObjectURL(selectedFile);E.fileName.textContent=selectedFile.name;E.makeGran.disabled=E.makeLoop.disabled=E.makeKeys.disabled=false};
async function fileDataUrl(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}
async function fileArrayBuffer(file){if(file.arrayBuffer)return file.arrayBuffer();return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsArrayBuffer(file)})}
async function decodeAudio(arr){return new Promise((res,rej)=>{const p=ctx.decodeAudioData(arr.slice(0),res,rej);if(p&&p.then)p.then(res,rej)})}
async function decodeSelected(){if(!selectedFile)return null;if(!await resume())return null;if(!selectedDataUrl)selectedDataUrl=await fileDataUrl(selectedFile);let buf=null;try{buf=await decodeAudio(await fileArrayBuffer(selectedFile))}catch(e){try{buf=await decodeAudio(await (await fetch(selectedDataUrl)).arrayBuffer())}catch(x){log('No se pudo preparar el audio')}}return{name:selectedFile.name,dataUrl:selectedDataUrl,mediaUrl:selectedMediaUrl||selectedDataUrl,buffer:buf}}
function media(src){const a=new Audio(src);a.preload='auto';a.playsInline=true;a.setAttribute('playsinline','');a.style.display='none';document.body.appendChild(a);a.load();return a}
function soundBounds(b){if(!b)return{start:0,end:1};const d=b.getChannelData(0),sr=b.sampleRate,w=Math.max(256,Math.floor(sr*.025));let peak=0;for(let i=0;i<d.length;i+=w){let sum=0;for(let j=0;j<w&&i+j<d.length;j++)sum+=Math.abs(d[i+j]);peak=Math.max(peak,sum/w)}const th=Math.max(.006,peak*.035);let a=0,z=d.length-1;for(let i=0;i<d.length;i+=w){let sum=0;for(let j=0;j<w&&i+j<d.length;j++)sum+=Math.abs(d[i+j]);if(sum/w>th){a=i;break}}for(let i=d.length-w;i>0;i-=w){let sum=0;for(let j=0;j<w&&i+j<d.length;j++)sum+=Math.abs(d[i+j]);if(sum/w>th){z=Math.min(d.length-1,i+w);break}}return{start:cl(a/d.length,0,.98),end:cl(z/d.length,.02,1)}}
function makeGranSlot(s){return{id:nextId++,name:s.name,dataUrl:s.dataUrl,mediaUrl:s.mediaUrl,media:s.mediaUrl?media(s.mediaUrl):null,buffer:s.buffer,playing:false,volume:.65,scaleDegree:0,scaleOctave:0,active:'A',motors:{A:{position:.25,grain:220,density:14,spread:.12,filter:1800},B:{position:.65,grain:140,density:20,spread:.24,filter:2600}},seq:false,env:'soft',grid:Array.from({length:28},(_,i)=>[3,10,17,24].includes(i)),gridAt:0}}
function makeLoopSlot(s){const b=soundBounds(s.buffer);return{id:nextId++,name:s.name,dataUrl:s.dataUrl,mediaUrl:s.mediaUrl,media:s.mediaUrl?media(s.mediaUrl):null,buffer:s.buffer,playing:false,volume:.75,start:b.start,end:b.end,rate:1,filter:8000,pan:0}}
E.makeGran.onclick=async()=>{const s=await decodeSelected();if(!s)return;const x=makeGranSlot(s);gran.push(x);focusedGran=x.id;render()};
E.makeLoop.onclick=async()=>{const s=await decodeSelected();if(!s)return;const x=makeLoopSlot(s);loops.push(x);focusedLoop=x.id;render()};
E.makeKeys.onclick=async()=>{const s=await decodeSelected();if(!s)return;keys.name=s.name;keys.dataUrl=s.dataUrl;keys.mediaUrl=s.mediaUrl;keys.media=s.mediaUrl?media(s.mediaUrl):null;keys.buffer=s.buffer;render()};
function gCode(s){const m=s.motors[s.active];return ['G',p(s.volume*100,3),p(m.grain,3),p(m.density,2),p(m.spread*100,2),p(m.filter,4),p(m.position*100,3),s.active==='B'?1:0].join('-')}
function lCode(s){return ['L',p(s.volume*100,3),p(s.start*100,3),p(s.end*100,3),p(s.rate*100,3),p(s.filter,4),p((s.pan+1)*100,3)].join('-')}
function kCode(){return ['K',p(keys.volume*100,3),p(keys.transpose+24,3),p(keys.filter,4),keys.mode==='vel'?1:0].join('-')}
function p(v,n){return String(Math.round(v)).padStart(n,'0')}
function parse(code){const a=String(code).trim().toUpperCase().split('-'),pre=a.shift(),n=a.map(Number);return n.some(Number.isNaN)?null:{pre,n}}
function applyG(s,code){const r=parse(code);if(!r||r.pre!=='G'||r.n.length<7)return false;const[v,gr,d,sp,f,pos,mot]=r.n;s.volume=cl(v/100,0,1);s.active=mot?'B':'A';Object.assign(s.motors[s.active],{grain:cl(gr,25,900),density:cl(d,2,45),spread:cl(sp/100,0,.7),filter:cl(f,200,8000),position:cl(pos/100,0,1)});return true}
function applyL(s,code){const r=parse(code);if(!r||r.pre!=='L'||r.n.length<6)return false;const[v,st,en,ra,f,pa]=r.n;Object.assign(s,{volume:cl(v/100,0,1),start:cl(st/100,0,1),end:cl(en/100,0,1),rate:cl(ra/100,.25,2.5),filter:cl(f,180,12000),pan:cl(pa/100-1,-1,1)});return true}
function cl(v,a,b){return Math.max(a,Math.min(b,v))}
function render(){E.granCount.textContent=gran.length;E.loopCount.textContent=loops.length;E.granList.innerHTML=gran.map(s=>cardG(s)+cardGX(s)).join('');E.loopList.innerHTML=loops.map(cardL).join('');gran.forEach(bindG);loops.forEach(bindL);renderKeys()}
function cardBase(kind,s,code,controls,extra=''){return `<div class="card ${kind==='g'&&s.id===focusedGran||kind==='l'&&s.id===focusedLoop?'focused':''}" data-k="${kind}" data-id="${s.id}"><div class="toolRow"><button class="playBtn ${s.playing?'playing':''}" data-play>${s.playing?'Stop':'Play'}</button><div class="cardName">${esc(s.name)}</div><button class="deleteBtn danger" data-del>×</button><input class="codeInput" data-code value="${code}">${extra}</div><canvas class="wave" width="560" height="122"></canvas><div>${controls}</div></div>`}
function row(id,param,label,min,max,step,val){const sh=['volume','start','end','rate','pan','position'].includes(param)?Number(val).toFixed(2):Math.round(val);return `<div class="row"><label>${label}</label><input data-param="${param}" type="range" min="${min}" max="${max}" step="${step}" value="${val}"><span>${sh}</span></div>`}
function cardG(s){s.active='A';s.scaleDegree??=0;s.scaleOctave??=0;const m=s.motors.A;return cardBase('g',s,gCode(s),`<div class="padGrid">${pad('pg','Pos / grano',m.position,1-(m.grain-25)/875,'mover muestra y tamano')}${pad('df','Dens / filtro',(m.density-2)/43,1-(m.filter-200)/7800,'nube y brillo')}${pad('fv','Vol / tono',s.volume,1-(m.filter-200)/7800,'salida y color')}${pad('sc','Tono / Octava',(s.scaleDegree??0)/6,1-(((s.scaleOctave??0)+2)/4),'escala musical')}</div>`) }
function pad(n,t,x,y,b){const parts=t.split(' / ');return `<div class="pad" data-pad="${n}" style="--x:${x};--y:${y}"><span class="xLab">${esc(parts[0]||t)}</span><span class="yLab">${esc(parts[1]||'')}</span></div>`}
function cardGX(s){return `<div class="card spacePanel" data-k="gx" data-id="${s.id}"><div class="cardName">Notas SpaceCraft ${s.id}</div><div class="envBox"><button data-seq class="${s.seq?'active':''}">Secuencia</button><button data-env="${s.env==='soft'?'tight':'soft'}" class="${s.env==='tight'?'active':''}">${s.env==='tight'?'Corte':'Envolvente'}</button></div><div class="noteGrid">${s.grid.map((on,i)=>`<button data-note="${i}" class="${on?'active':''} ${i%7===3?'root':''}">${['C','D','E','F','G','A','B'][i%7]}</button>`).join('')}</div></div>`}
function cardL(s){return cardBase('l',s,lCode(s),row(s.id,'volume','Vol',0,1,.01,s.volume)+row(s.id,'start','In',0,1,.001,s.start)+row(s.id,'end','Out',0,1,.001,s.end)+row(s.id,'rate','Rate',.25,2.5,.01,s.rate)+row(s.id,'filter','Filt',180,12000,20,s.filter)+row(s.id,'pan','Pan',-1,1,.01,s.pan))}
function bindDelete(btn,fn){let t=null;const cancel=()=>{clearTimeout(t);t=null;btn.classList.remove('holding')};btn.onpointerdown=e=>{e.preventDefault();btn.classList.add('holding');t=setTimeout(fn,1000)};btn.onpointerup=btn.onpointerleave=btn.onpointercancel=cancel;btn.onclick=e=>e.preventDefault()}
function bindG(s){const el=document.querySelector(`[data-k="g"][data-id="${s.id}"]`),panel=document.querySelector(`[data-k="gx"][data-id="${s.id}"]`),canvas=el.querySelector('canvas');bindDelete(el.querySelector('[data-del]'),()=>{stopG(s);gran.splice(gran.indexOf(s),1);render()});el.querySelector('[data-play]').onclick=()=>{focusedGran=s.id;ac();unlockAudio().catch(()=>{});s.playing=!s.playing;s.playing?startG(s):stopG(s);const b=el.querySelector('[data-play]');b.textContent=s.playing?'Stop':'Play';b.classList.toggle('playing',s.playing);el.classList.add('focused')};el.querySelectorAll('[data-pad]').forEach(p=>{setPadPoint(p,Number(p.style.getPropertyValue('--x'))||0,Number(p.style.getPropertyValue('--y'))||0);p.onpointerdown=e=>padMove(e,s,p);p.onpointermove=e=>{if(e.buttons===1)padMove(e,s,p)}});if(panel){panel.querySelector('[data-seq]').onclick=()=>{s.seq=!s.seq;s.gridAt=0;render()};panel.querySelectorAll('[data-env]').forEach(b=>b.onclick=()=>{s.env=b.dataset.env;render()});panel.querySelectorAll('[data-note]').forEach(b=>b.onclick=()=>{s.grid[Number(b.dataset.note)]=!s.grid[Number(b.dataset.note)];render()})}const ci=el.querySelector('[data-code]');ci.onkeydown=e=>{if(e.key==='Enter'&&applyG(s,ci.value)){restartG(s);render()}};ci.onblur=()=>{if(applyG(s,ci.value)){restartG(s);render()}};drawG(s,canvas)}
