<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Musicon2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root { --bg:#070b0d; --panel:#11191d; --panel2:#182329; --line:#314148; --text:#eef7f3; --muted:#9cafad; --green:#39a96b; --blue:#3974c8; --red:#7e2d2d; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  button, select, input { font:inherit; }
  button, select, .fileBtn, input.codeInput { min-height:34px; border:1px solid #405259; border-radius:8px; background:#202b30; color:#fff; padding:5px 7px; }
  button { cursor:pointer; }
  button.active { background:var(--green); border-color:#6ed99b; }
  button.alt { background:var(--blue); border-color:#6ea1ff; }
  button.danger { background:var(--red); border-color:#a84a4a; }
  button:disabled { opacity:.35; }
  input[type="file"] { display:none; }
  main { max-width:1200px; margin:0 auto; padding:5px; }
  .loader { display:grid; grid-template-columns:76px 1fr auto auto auto; gap:5px; margin-bottom:6px; padding:5px; border:1px solid var(--line); border-radius:8px; background:var(--panel); }
  .fileBtn { display:flex; align-items:center; justify-content:center; }
  .name { color:var(--muted); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:flex; align-items:center; }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
  .sectionTitle { margin:10px 0 5px; color:var(--muted); font-size:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; display:flex; align-items:center; justify-content:space-between; }
  .card { position:relative; border:1px solid var(--line); border-radius:8px; background:var(--panel2); padding:5px; }
  .card.focused { outline:2px solid rgba(57,169,107,.45); }
  .deleteBtn { position:absolute; top:5px; right:5px; width:24px; height:24px; min-height:24px; border-radius:50%; padding:0; font-weight:900; line-height:1; z-index:4; opacity:.82; }
  .deleteBtn.holding { opacity:1; background:#c23a3a; box-shadow:0 0 0 3px rgba(194,58,58,.35); }
  .cardName { padding-right:30px; min-height:24px; display:flex; align-items:center; color:var(--muted); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .toolRow { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
  .toolRow > * { flex:0 0 auto; }
  .codeInput { flex:1 1 160px; min-width:140px; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  .wave { width:100%; height:122px; display:block; margin-top:5px; border:1px solid #263940; border-radius:8px; background:#0b1114; touch-action:none; }
  .row { display:grid; grid-template-columns:46px 1fr 42px; gap:4px; align-items:center; margin-top:4px; }
  .row label { color:var(--muted); font-size:11px; }
  input[type="range"] { width:100%; }
  .keyboardWrap { margin-top:8px; padding:5px; border:1px solid var(--line); border-radius:8px; background:var(--panel); }
  .keyboardHead { display:grid; grid-template-columns:1fr auto auto auto; gap:5px; align-items:center; margin-bottom:5px; }
  .keyboardStatus { color:var(--muted); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .keyboard { display:flex; gap:2px; overflow-x:auto; min-height:84px; padding-bottom:2px; }
  .key { min-width:34px; height:82px; background:#edf2f3; color:#111; border-radius:0 0 7px 7px; display:flex; align-items:flex-end; justify-content:center; padding-bottom:5px; font-weight:800; font-size:12px; }
  .key.black { min-width:22px; height:56px; margin-left:-13px; margin-right:-13px; z-index:3; background:#050606; color:#fff; border:1px solid #333; }
  .key.down { filter:brightness(1.35); transform:translateY(2px); }
  @media (max-width:720px) {
    .loader { grid-template-columns:60px 1fr auto auto; }
    .cards { grid-template-columns:1fr; }
    .wave { height:96px; }
    .row { grid-template-columns:42px 1fr 36px; }
    button, select, .fileBtn, input.codeInput { min-height:30px; font-size:12px; padding:4px 6px; }
    .keyboardHead { grid-template-columns:1fr auto auto; }
    .key { min-width:30px; height:72px; }
    .key.black { min-width:20px; height:50px; margin-left:-12px; margin-right:-12px; }
  }
</style>
</head>
<body>
<main>
  <section class="loader">
    <label class="fileBtn">Cargar<input id="sampleInput" type="file" accept=".mp3,.m4a,.wav,.aac,.aif,.aiff,audio/mpeg,audio/mp3,audio/mp4,audio/aac,audio/wav,audio/x-wav,audio/aiff"></label>
    <div class="name" id="loadedSampleName">---</div>
    <button class="alt" id="btnGranular" disabled>Granular</button>
    <button class="alt" id="btnLoop" disabled>Loop</button>
    <button class="alt" id="btnKeyboard" disabled>Teclado</button>
    <button id="btnAudioTest">Test</button>
  </section>

  <div class="sectionTitle">
    <span>Granulares</span>
    <span id="granularCount">0</span>
  </div>
  <section class="cards" id="granularList"></section>

  <div class="sectionTitle">
    <span>Loops</span>
    <span id="loopCount">0</span>
  </div>
  <section class="cards" id="loopList"></section>

  <section class="keyboardWrap">
    <div class="keyboardHead">
      <div class="keyboardStatus" id="keyboardStatus">Teclado: sin carga</div>
      <input class="codeInput" id="keyboardCode" placeholder="CÓDIGO TECLADO">
      <select id="keyboardVolumeMode">
        <option value="fixed">Volumen fijo</option>
        <option value="vel">Volumen por ataque</option>
      </select>
      <button id="keyboardApply">Aplicar</button>
    </div>
    <div id="keyboardControls"></div>
    <section class="keyboard" id="keyboard"></section>
  </section>
</main>

<script>
const APP_KEY = 'musicon2-local-state';
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const activeNotes = new Map();
const granularTimers = new Map();
const loopNodes = new Map();
const dragState = { gran: new Map(), loop: new Map() };

let ctx = null;
let master = null;
let pendingSample = null;
let persistenceTimer = null;
let statusTimer = null;
let nextUid = 1;
let focusedGranularId = null;
let focusedLoopId = null;

const granulars = [];
const loops = [];
const keyboardSlot = makeKeyboardSlot();

const els = {
  sampleInput: document.getElementById('sampleInput'),
  loadedSampleName: document.getElementById('loadedSampleName'),
  btnGranular: document.getElementById('btnGranular'),
  btnLoop: document.getElementById('btnLoop'),
  btnKeyboard: document.getElementById('btnKeyboard'),
  btnAudioTest: document.getElementById('btnAudioTest'),
  granularList: document.getElementById('granularList'),
  loopList: document.getElementById('loopList'),
  granularCount: document.getElementById('granularCount'),
  loopCount: document.getElementById('loopCount'),
  keyboardStatus: document.getElementById('keyboardStatus'),
  keyboardCode: document.getElementById('keyboardCode'),
  keyboardVolumeMode: document.getElementById('keyboardVolumeMode'),
  keyboardApply: document.getElementById('keyboardApply'),
  keyboard: document.getElementById('keyboard'),
  keyboardControls: document.getElementById('keyboardControls')
};

function makeGranular() {
  return { uid: nextUid++, code:'', sampleName:'---', sampleData:'', buffer:null, loading:'', playing:false, volume:0.65, activeMotor:'A', motors:{ A:{ position:0.25, grain:220, density:14, spread:0.12, filter:1800 }, B:{ position:0.65, grain:140, density:20, spread:0.24, filter:2600 } } };
}
function makeLoop() {
  return { uid: nextUid++, code:'', sampleName:'---', sampleData:'', buffer:null, loading:'', playing:false, volume:0.75, start:0, end:1, rate:1, filter:8000, pan:0 };
}
function makeKeyboardSlot() { return { code:'', sampleName:'---', sampleData:'', buffer:null, loading:'', volumeMode:'fixed', volume:0.8, transpose:0, filter:7000 }; }

function ensureAudio() {
  if (!ctx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return setStatus('Audio no disponible'), false;
    ctx = new AC();
    master = ctx.createGain();
    master.gain.value = 1;
    master.connect(ctx.destination);
  }
  return true;
}

async function unlockAudio() {
  if (!ensureAudio() || !ctx || !master) return false;
  try {
    if (ctx.state !== 'running') await ctx.resume();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, now);
    gain.gain.setValueAtTime(0.001, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
    osc.connect(gain);
    gain.connect(master);
    osc.start(now);
    osc.stop(now + 0.06);
    return ctx.state === 'running';
  } catch (err) {
    console.error('unlockAudio', err);
    return false;
  }
}

async function playAudioTest() {
  if (!await unlockAudio()) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const now = ctx.currentTime;
  osc.type = 'square';
  osc.frequency.setValueAtTime(660, now);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.55, now + 0.04);
  gain.gain.linearRampToValueAtTime(0.55, now + 0.65);
  gain.gain.linearRampToValueAtTime(0, now + 0.9);
  osc.connect(gain);
  gain.connect(master);
  osc.start(now);
  osc.stop(now + 0.95);
}

els.sampleInput.onchange = async () => {
  if (!ensureAudio()) return;
  const file = els.sampleInput.files[0];
  if (!file) return;
  els.loadedSampleName.textContent = file.name + ' · cargando';
  try {
    const arr = await file.arrayBuffer();
    const buffer = await decodeAudioArrayBuffer(arr.slice(0));
    const dataUrl = await fileToDataUrl(file);
    pendingSample = { name:file.name, dataUrl, buffer, sampleId:Date.now() + '-' + Math.random().toString(36).slice(2,8) };
    els.loadedSampleName.textContent = file.name;
  } catch (err) {
    pendingSample = null;
    els.loadedSampleName.textContent = file.name + ' · no decodifica';
    console.error(err);
    return;
  }
  els.btnGranular.disabled = els.btnLoop.disabled = els.btnKeyboard.disabled = false;
};

els.btnGranular.onclick = async () => { if (pendingSample) { const s = await createGranularFromPending(); if (s) { granulars.push(s); focusedGranularId = s.uid; renderAll(); schedulePersist(); } } };
els.btnLoop.onclick = async () => { if (pendingSample) { const s = await createLoopFromPending(); if (s) { loops.push(s); focusedLoopId = s.uid; renderAll(); schedulePersist(); } } };
els.btnKeyboard.onclick = async () => { if (pendingSample) { await assignKeyboardFromPending(); renderAll(); schedulePersist(); } };
els.btnAudioTest.onclick = async () => playAudioTest();
els.keyboardApply.onclick = () => applyKeyboardCode();
els.keyboardVolumeMode.onchange = () => { keyboardSlot.volumeMode = els.keyboardVolumeMode.value === 'vel' ? 'vel' : 'fixed'; renderAll(); schedulePersist(); };
els.keyboardCode.addEventListener('keydown', e => { if (e.key === 'Enter') applyKeyboardCode(); });
els.keyboardCode.addEventListener('input', () => { keyboardSlot.code = els.keyboardCode.value.trim().toUpperCase(); schedulePersist(); });

function setStatus(text, timeout = 1400) {
  console.log(text);
}

function schedulePersist() {
  clearTimeout(persistenceTimer);
  persistenceTimer = setTimeout(persistState, 120);
}

function persistState() {
  const state = { nextUid, granulars: granulars.map(snapshotGranular), loops: loops.map(snapshotLoop), keyboard: snapshotKeyboard() };
  localStorage.setItem(APP_KEY, JSON.stringify(state));
}

async function restoreState() {
  const raw = localStorage.getItem(APP_KEY);
  if (!raw) return;
  try {
    const state = JSON.parse(raw);
    nextUid = Number(state.nextUid) || 1;
    if (Array.isArray(state.granulars)) {
      for (const snap of state.granulars) {
        const slot = makeGranular();
        slot.uid = Number(snap.uid) || slot.uid;
        granulars.push(slot);
        await applyGranularSnapshot(slot, snap);
      }
    }
    if (Array.isArray(state.loops)) {
      for (const snap of state.loops) {
        const slot = makeLoop();
        slot.uid = Number(snap.uid) || slot.uid;
        loops.push(slot);
        await applyLoopSnapshot(slot, snap);
      }
    }
    if (state.keyboard) await applyKeyboardSnapshot(state.keyboard);
  } catch (_) {
    granulars.length = 0;
    loops.length = 0;
  }
}

function makeNumericCode(prefix, values) { return prefix + '-' + values.map(v => String(v)).join('-'); }
function pad(v, n) { return String(Math.round(v)).padStart(n, '0'); }

function granularCode(slot) {
  const m = slot.motors[slot.activeMotor];
  return makeNumericCode('G', [pad(slot.volume * 100,3), pad(m.grain,3), pad(m.density,2), pad(m.spread * 100,2), pad(m.filter,4), pad(m.position * 100,3), slot.activeMotor === 'B' ? 1 : 0]);
}
function loopCode(slot) { return makeNumericCode('L', [pad(slot.volume * 100,3), pad(slot.start * 100,3), pad(slot.end * 100,3), pad(slot.rate * 100,3), pad(slot.filter,4), pad((slot.pan + 1) * 100,3)]); }
function keyboardCodeValue(slot) { return makeNumericCode('K', [pad(slot.volume * 100,3), pad(slot.transpose + 24,3), pad(slot.filter,4), slot.volumeMode === 'vel' ? 1 : 0]); }

function parseNumericCode(code) {
  const cleaned = String(code || '').trim().toUpperCase();
  const parts = cleaned.split('-');
  if (parts.length < 2) return null;
  const prefix = parts[0];
  const nums = parts.slice(1).map(p => Number(p));
  if (nums.some(n => Number.isNaN(n))) return null;
  return { prefix, nums };
}

function applyGranularCode(slot, code) {
  const p = parseNumericCode(code); if (!p || p.prefix !== 'G' || p.nums.length < 7) return false;
  const [vol, grain, density, spread, filter, pos, motor] = p.nums;
  slot.volume = clamp(vol / 100, 0, 1);
  slot.activeMotor = motor ? 'B' : 'A';
  const m = slot.motors[slot.activeMotor];
  m.grain = clamp(grain, 25, 900);
  m.density = clamp(density, 2, 45);
  m.spread = clamp(spread / 100, 0, 0.7);
  m.filter = clamp(filter, 200, 8000);
  m.position = clamp(pos / 100, 0, 1);
  slot.code = granularCode(slot);
  return true;
}

function applyLoopCode(slot, code) {
  const p = parseNumericCode(code); if (!p || p.prefix !== 'L' || p.nums.length < 6) return false;
  const [vol, start, end, rate, filter, pan] = p.nums;
  slot.volume = clamp(vol / 100, 0, 1);
  slot.start = clamp(start / 100, 0, 1);
  slot.end = clamp(end / 100, 0, 1);
  slot.rate = clamp(rate / 100, .25, 2.5);
  slot.filter = clamp(filter, 180, 12000);
  slot.pan = clamp(pan / 100 - 1, -1, 1);
  slot.code = loopCode(slot);
  return true;
}

function applyKeyboardCodeFromText(code) {
  const p = parseNumericCode(code); if (!p || p.prefix !== 'K' || p.nums.length < 4) return false;
  const [vol, tr, filter, mode] = p.nums;
  keyboardSlot.volume = clamp(vol / 100, 0, 1);
  keyboardSlot.transpose = clamp(tr - 24, -24, 24);
  keyboardSlot.filter = clamp(filter, 300, 12000);
  keyboardSlot.volumeMode = mode ? 'vel' : 'fixed';
  keyboardSlot.code = keyboardCodeValue(keyboardSlot);
  return true;
}

async function createGranularFromPending() {
  const slot = makeGranular();
  slot.sampleName = pendingSample.name;
  slot.sampleData = pendingSample.dataUrl;
  slot.buffer = pendingSample.buffer;
  slot.loading = 'listo';
  slot.code = granularCode(slot);
  return slot;
}
async function createLoopFromPending() {
  const slot = makeLoop();
  slot.sampleName = pendingSample.name;
  slot.sampleData = pendingSample.dataUrl;
  slot.buffer = pendingSample.buffer;
  slot.loading = 'listo';
  slot.code = loopCode(slot);
  return slot;
}
async function assignKeyboardFromPending() {
  keyboardSlot.sampleName = pendingSample.name;
  keyboardSlot.sampleData = pendingSample.dataUrl;
  keyboardSlot.buffer = pendingSample.buffer;
  keyboardSlot.loading = 'listo';
  keyboardSlot.code = keyboardCodeValue(keyboardSlot);
}

function snapshotGranular(slot) { return { uid: slot.uid, code: slot.code, sampleName: slot.sampleName, sampleData: slot.sampleData, playing: slot.playing, volume: slot.volume, activeMotor: slot.activeMotor, motors:{ A:{...slot.motors.A}, B:{...slot.motors.B} } }; }
function snapshotLoop(slot) { return { uid: slot.uid, code: slot.code, sampleName: slot.sampleName, sampleData: slot.sampleData, playing: slot.playing, volume: slot.volume, start: slot.start, end: slot.end, rate: slot.rate, filter: slot.filter, pan: slot.pan }; }
function snapshotKeyboard() { return { code: keyboardSlot.code, sampleName: keyboardSlot.sampleName, sampleData: keyboardSlot.sampleData, volumeMode: keyboardSlot.volumeMode, volume: keyboardSlot.volume, transpose: keyboardSlot.transpose, filter: keyboardSlot.filter }; }

async function applyGranularSnapshot(slot, snap) {
  slot.sampleName = snap.sampleName || '---';
  slot.sampleData = snap.sampleData || '';
  slot.volume = numberOr(slot.volume, snap.volume);
  slot.activeMotor = snap.activeMotor === 'B' ? 'B' : 'A';
  if (snap.motors) {
    for (const id of ['A','B']) {
      if (!snap.motors[id]) continue;
      Object.assign(slot.motors[id], snap.motors[id]);
    }
  }
  if (slot.sampleData) slot.buffer = await decodeDataUrl(slot.sampleData);
  slot.code = snap.code || granularCode(slot);
  slot.playing = !!snap.playing;
  if (slot.playing) startGranular(slot);
}
async function applyLoopSnapshot(slot, snap) {
  slot.sampleName = snap.sampleName || '---';
  slot.sampleData = snap.sampleData || '';
  slot.volume = numberOr(slot.volume, snap.volume);
  slot.start = numberOr(slot.start, snap.start);
  slot.end = numberOr(slot.end, snap.end);
  slot.rate = numberOr(slot.rate, snap.rate);
  slot.filter = numberOr(slot.filter, snap.filter);
  slot.pan = numberOr(slot.pan, snap.pan);
  if (slot.sampleData) slot.buffer = await decodeDataUrl(slot.sampleData);
  slot.code = snap.code || loopCode(slot);
  slot.playing = !!snap.playing;
  if (slot.playing) startLoop(slot);
}
async function applyKeyboardSnapshot(snap) {
  keyboardSlot.sampleName = snap.sampleName || '---';
  keyboardSlot.sampleData = snap.sampleData || '';
  keyboardSlot.volumeMode = snap.volumeMode === 'vel' ? 'vel' : 'fixed';
  keyboardSlot.volume = numberOr(keyboardSlot.volume, snap.volume);
  keyboardSlot.transpose = numberOr(keyboardSlot.transpose, snap.transpose);
  keyboardSlot.filter = numberOr(keyboardSlot.filter, snap.filter);
  if (keyboardSlot.sampleData) keyboardSlot.buffer = await decodeDataUrl(keyboardSlot.sampleData);
  keyboardSlot.code = snap.code || keyboardCodeValue(keyboardSlot);
}

function numberOr(current, value) { return typeof value === 'number' && Number.isFinite(value) ? value : current; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function setMotorValue(slot, param, value) { slot.motors[slot.activeMotor][param] = value; slot.code = granularCode(slot); }

function renderAll() {
  renderStatus();
  renderLists();
  renderKeyboard();
  renderFocus();
}

function renderStatus() {}

function renderLists() {
  els.granularCount.textContent = String(granulars.length);
  els.loopCount.textContent = String(loops.length);
  els.granularList.innerHTML = granulars.map(renderGranularCard).join('');
  els.loopList.innerHTML = loops.map(renderLoopCard).join('');
  granulars.forEach(bindGranularCard);
  loops.forEach(bindLoopCard);
}

function emptyBox(text) { return `<div class="name" style="padding:8px 2px;">${escapeHtml(text)}</div>`; }

function renderGranularCard(slot) { return cardTemplate('granular', slot, granularCode(slot), `
  ${row(slot.uid,'volume','Vol',0,1,.01,slot.volume,'granular')}
  ${row(slot.uid,'grain','Grano',25,900,5,slot.motors[slot.activeMotor].grain,'granular')}
  ${row(slot.uid,'density','Dens',2,45,1,slot.motors[slot.activeMotor].density,'granular')}
  ${row(slot.uid,'spread','Spr',0,.7,.01,slot.motors[slot.activeMotor].spread,'granular')}
  ${row(slot.uid,'filter','Filt',200,8000,20,slot.motors[slot.activeMotor].filter,'granular')}
  ${row(slot.uid,'position','Pos',0,1,.001,slot.motors[slot.activeMotor].position,'granular')}
`); }
function renderLoopCard(slot) { return cardTemplate('loop', slot, loopCode(slot), `
  ${row(slot.uid,'volume','Vol',0,1,.01,slot.volume,'loop')}
  ${row(slot.uid,'start','In',0,1,.001,slot.start,'loop')}
  ${row(slot.uid,'end','Out',0,1,.001,slot.end,'loop')}
  ${row(slot.uid,'rate','Rate',.25,2.5,.01,slot.rate,'loop')}
  ${row(slot.uid,'filter','Filt',180,12000,20,slot.filter,'loop')}
  ${row(slot.uid,'pan','Pan',-1,1,.01,slot.pan,'loop')}
`); }

function cardTemplate(kind, slot, code, controls) {
  const active = kind === 'granular' ? granulars.includes(slot) && slot.uid === focusedGranularId : loops.includes(slot) && slot.uid === focusedLoopId;
  return `
    <div class="card ${active ? 'focused' : ''}" data-kind="${kind}" data-uid="${slot.uid}">
      <button class="deleteBtn danger" data-action="delete">×</button>
      <div class="cardName">${kind === 'granular' ? 'Granular' : 'Loop'} ${slot.uid} · ${escapeHtml(slot.sampleName)}${slot.loading ? ' · ' + escapeHtml(slot.loading) : ''}</div>
      <div class="toolRow">
        <input class="codeInput" data-action="code" value="${escapeHtml(code)}" placeholder="CÓDIGO">
        <button data-action="focus" class="alt">Activo</button>
        <button data-action="play">${slot.playing ? 'Stop' : 'Play'}</button>
        ${kind === 'granular' ? `<select data-action="motor"><option value="A" ${slot.activeMotor === 'A' ? 'selected' : ''}>A</option><option value="B" ${slot.activeMotor === 'B' ? 'selected' : ''}>B</option></select>` : ''}
      </div>
      <canvas class="wave" data-action="wave" width="560" height="122"></canvas>
      <div data-action="controls">${controls}</div>
    </div>
  `;
}

function bindGranularCard(slot) {
  const el = document.querySelector(`.card[data-kind="granular"][data-uid="${slot.uid}"]`); if (!el) return;
  bindDeleteHold(el.querySelector('[data-action="delete"]'), 'granular', slot.uid);
  el.querySelector('[data-action="focus"]').onclick = () => { focusedGranularId = slot.uid; renderAll(); schedulePersist(); };
  el.querySelector('[data-action="play"]').onclick = async () => toggleGranular(slot);
  el.querySelector('[data-action="motor"]').onchange = e => { slot.activeMotor = e.target.value === 'B' ? 'B' : 'A'; slot.code = granularCode(slot); renderAll(); schedulePersist(); };
  const codeInput = el.querySelector('[data-action="code"]');
  codeInput.onkeydown = e => { if (e.key === 'Enter') applyCodeToSlot('granular', slot, codeInput.value); };
  codeInput.onblur = () => applyCodeToSlot('granular', slot, codeInput.value);
  el.querySelector('[data-action="wave"]').onpointerdown = evt => startGranularMove(evt, slot.uid);

function bindRanges(el, kind, slot) { el.querySelectorAll('input[data-param]').forEach(input => { const shown = input.nextElementSibling; input.onpointerdown = () => ensureAudio(); input.oninput = () => { const v = Number(input.value); if (kind === 'granular') { if (input.dataset.param === 'volume') slot.volume = v; else slot.motors[slot.activeMotor][input.dataset.param] = v; slot.code = granularCode(slot); } else { slot[input.dataset.param] = v; slot.code = loopCode(slot); } if (shown) shown.textContent = ['volume','start','end','rate','pan','position'].includes(input.dataset.param) ? v.toFixed(2) : Math.round(v); if (kind === 'granular' && input.dataset.param === 'density') restartGranular(slot); if (kind === 'loop' && ['start','end'].includes(input.dataset.param)) restartLoop(slot); else if (kind === 'loop') updateLoopNode(slot); updateCodeInput(kind, slot); schedulePersist(); }; }); }
function updateCodeInput(kind, slot) { const card = document.querySelector(`.card[data-kind="${kind}"][data-uid="${slot.uid}"]`); if (!card) return; const input = card.querySelector('[data-action="code"]'); if (input) input.value = kind === 'granular' ? granularCode(slot) : loopCode(slot); }

function snapshotGranular(slot) { return { uid:slot.uid, code:slot.code || granularCode(slot), sampleName:slot.sampleName, sampleData:slot.sampleData, playing:slot.playing, volume:slot.volume, activeMotor:slot.activeMotor, motors:{ A:{...slot.motors.A}, B:{...slot.motors.B} } }; }
function snapshotLoop(slot) { return { uid:slot.uid, code:slot.code || loopCode(slot), sampleName:slot.sampleName, sampleData:slot.sampleData, playing:slot.playing, volume:slot.volume, start:slot.start, end:slot.end, rate:slot.rate, filter:slot.filter, pan:slot.pan }; }
function snapshotKeyboard() { return { code:keyboardSlot.code || keyboardCodeValue(keyboardSlot), sampleName:keyboardSlot.sampleName, sampleData:keyboardSlot.sampleData, volumeMode:keyboardSlot.volumeMode, volume:keyboardSlot.volume, transpose:keyboardSlot.transpose, filter:keyboardSlot.filter }; }

function removeSlot(kind, uid) { if (kind === 'granular') { const i = granulars.findIndex(x => x.uid === uid); if (i >= 0) { stopGranular(granulars[i]); granulars.splice(i,1); if (focusedGranularId === uid) focusedGranularId = granulars[0]?.uid ?? null; } } else { const i = loops.findIndex(x => x.uid === uid); if (i >= 0) { stopLoop(loops[i]); loops.splice(i,1); if (focusedLoopId === uid) focusedLoopId = loops[0]?.uid ?? null; } } renderAll(); schedulePersist(); }

async function fileToDataUrl(file) { return new Promise((resolve, reject) => { const r = new FileReader(); r.onload = () => resolve(r.result); r.onerror = reject; r.readAsDataURL(file); }); }
async function decodeAudioArrayBuffer(arr) { ensureAudio(); return ctx.decodeAudioData(arr); }
async function decodeDataUrl(dataUrl) { ensureAudio(); const response = await fetch(dataUrl); const arr = await response.arrayBuffer(); return decodeAudioArrayBuffer(arr); }
function escapeHtml(text) { return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

(async () => {
  localStorage.removeItem(APP_KEY);
  renderAll();
  buildKeyboard();
  renderAll();
})();
</script>
